<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historias de Usuario - Total Weight v1.0</title>
    <style>
        :root {
            --primary: #004aad;
            --secondary: #e60000;
            --bg-light: #f8fafc;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }
        body, html {
            margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh; background-color: var(--bg-light); color: var(--text-dark);
            overflow: hidden;
        }
        .app-container { display: flex; height: 100vh; }
        
        .sidebar { 
            width: 320px; background-color: #ffffff; border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            z-index: 10;
        }
        .brand { padding: 25px 20px; text-align: center; border-bottom: 1px solid var(--border); background-color: #ffffff; }
        .brand h1 { margin: 0; color: var(--secondary); font-style: italic; font-size: 1.8rem; font-weight: 900; letter-spacing: -0.5px; }
        .brand p { margin: 5px 0 0; color: var(--primary); font-size: 0.85rem; font-weight: bold; }
        
        .hu-list { flex-grow: 1; overflow-y: auto; padding: 15px 0; }
        .menu-section { padding: 10px 20px 5px 20px; font-size: 0.75rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        
        .hu-item { padding: 12px 20px; cursor: pointer; border-left: 4px solid transparent; transition: all 0.2s; border-bottom: 1px solid #f1f5f9; display: flex; flex-direction: column; }
        .hu-item:hover { background-color: #f8fafc; }
        .hu-item.active { background-color: #eff6ff; border-left-color: var(--primary); }
        .hu-id { font-size: 0.75rem; font-weight: 900; color: var(--primary); }
        .hu-item.active .hu-id { color: var(--secondary); }
        .hu-title { font-size: 0.85rem; font-weight: 600; margin-top: 4px; color: var(--text-dark); }
        
        .main-content { flex-grow: 1; overflow-y: auto; padding: 40px; background-color: var(--bg-light); }
        .hu-detail-card { background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 40px; max-width: 1100px; margin: 0 auto; display: none; border-top: 5px solid var(--primary); }
        .hu-detail-card.active { display: block; animation: fadeIn 0.4s ease-out; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .detail-header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 2px solid var(--border); padding-bottom: 20px; margin-bottom: 25px; }
        .detail-header h2 { margin: 0; color: var(--text-dark); font-size: 1.6rem; font-weight: 800; }
        .badge { background: #fee2e2; color: var(--secondary); padding: 6px 15px; border-radius: 20px; font-size: 0.9rem; font-weight: 900; letter-spacing: 1px; }
        
        .user-story-format { background-color: #f8fafc; border-left: 4px solid var(--secondary); padding: 20px; margin-bottom: 30px; border-radius: 0 8px 8px 0; }
        .user-story-format p { margin: 8px 0; font-size: 1rem; line-height: 1.5; color: #334155; }
        .user-story-format strong { color: var(--primary); font-weight: 800; display: inline-block; width: 70px; }
        
        h3 { color: var(--primary); font-size: 1.1rem; margin-top: 30px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        ul.criteria { padding-left: 25px; margin-top: 15px; }
        ul.criteria li { margin-bottom: 10px; color: #475569; font-size: 0.95rem; line-height: 1.5; }
        
        .screenshot-container { margin-top: 30px; text-align: center; background: #f1f5f9; padding: 20px; border-radius: 12px; border: 2px dashed #cbd5e1; }
        .screenshot-container img { max-width: 100%; height: auto; border-radius: 8px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); border: 1px solid var(--border); }
        .screenshot-help { font-size: 0.85rem; color: var(--text-muted); margin-top: 15px; background: #e2e8f0; display: inline-block; padding: 5px 15px; border-radius: 20px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <div class="brand">
    <img src="totalweight-logo.png" alt="Logo Total Weight" style="width: 100%; max-width: 250px; height: auto; margin-bottom: 10px;">
    <p>Documentación Ágil v1.0</p>
</div>
        <div class="hu-list" id="hu-list"></div>
    </div>
    <div class="main-content" id="main-content"></div>
</div>

<script>
    const historias = [
        { seccion: "OPERACIONES CORE", id: "HU-01", titulo: "Dashboard Principal", rol: "Supervisor", accion: "visualizar métricas clave al iniciar sesión", beneficio: "monitorear camiones, pesajes y operaciones en tiempo real.", criterios: ["Mostrar tarjetas de KPIs de tickets emitidos y peso neto.", "Incluir acceso rápido a pesajes.", "Mostrar lista de últimas operaciones."], imagen: "hu01_dashboard.png" },
        { id: "HU-02", titulo: "Primera Pesada (Entrada)", rol: "Operador de Balanza", accion: "registrar la entrada de un vehículo", beneficio: "capturar el peso inicial (tara o bruto) y documentar la carga.", criterios: ["Activar modo ENTRADA / PRIMERA PESADA.", "Validar campos obligatorios marcados con (*).", "Capturar el peso sincronizado de la balanza."], imagen: "hu02_entrada.png" },
        { id: "HU-03", titulo: "Segunda Pesada (Salida)", rol: "Operador de Balanza", accion: "recuperar un ticket pendiente para pesaje final", beneficio: "calcular automáticamente el peso neto de la carga.", criterios: ["Bloquear la edición de datos de origen al recuperar la placa.", "Calcular y resaltar el Peso Neto.", "Permitir visualizar camiones pendientes para selección rápida."], imagen: "hu03_salida.png" },
        { id: "HU-04", titulo: "Impresión Preliminar", rol: "Operador de Balanza", accion: "visualizar el formato final del ticket", beneficio: "verificar todos los datos antes de imprimir o guardar.", criterios: ["Mostrar logo y branding de la empresa.", "Habilitar botones funcionales para Imprimir, Correo y PDF."], imagen: "hu04_impresion.png" },
        
        { seccion: "ANÁLISIS DE DATOS", id: "HU-05", titulo: "Auditoría y Reportes", rol: "Supervisor", accion: "consultar y filtrar el histórico de tickets", beneficio: "auditar transacciones y consolidar los pesajes de la planta.", criterios: ["Disponer de filtros avanzados (Fecha, Placa, Producto).", "Calcular la sumatoria del peso neto consolidado.", "Mostrar estados del ticket con etiquetas visuales."], imagen: "hu05_reportes.png" },
        
        { seccion: "CONFIGURACIÓN GLOBAL", id: "HU-06", titulo: "Parámetros: Ficha Datos", rol: "Administrador", accion: "modificar el encabezado y pie del ticket", beneficio: "mantener actualizada la razón social y datos fiscales.", criterios: ["Permitir editar Nombre, RUC y Dirección.", "Establecer cláusulas legales del pie de página."], imagen: "hu06_param_datos.png" },
        { id: "HU-07", titulo: "Parámetros: Ficha Impresora", rol: "Administrador", accion: "configurar el dispositivo de salida", beneficio: "optimizar la impresión en ticketeras matriciales.", criterios: ["Permitir seleccionar puerto/dispositivo.", "Habilitar modo texto nativo."], imagen: "hu07_param_impresora.png" },
        { id: "HU-08", titulo: "Parámetros: Ficha Correo", rol: "Administrador", accion: "configurar el servidor SMTP", beneficio: "enviar notificaciones automáticas y copias de seguridad.", criterios: ["Configurar host, usuario y enmascarar contraseña.", "Activar opción de envío desatendido al cerrar pesajes."], imagen: "hu08_param_correo.png" },
        { id: "HU-09", titulo: "Parámetros: Ficha Comunicación", rol: "Administrador", accion: "configurar los parámetros RS-232", beneficio: "sincronizar el sistema con el indicador de peso.", criterios: ["Definir puerto COM, velocidad, bits y paridad.", "Botón de prueba local para diagnosticar la conexión."], imagen: "hu09_param_comunicacion.png" },
        { id: "HU-10", titulo: "Parámetros: Ficha Operación", rol: "Administrador", accion: "establecer reglas obligatorias", beneficio: "evitar omisiones de datos como la Guía de Remisión.", criterios: ["Matriz interactiva para definir campos requeridos.", "Ruta exportable para conectividad SAP."], imagen: "hu10_param_operacion.png" },
        { id: "HU-11", titulo: "Parámetros: Ficha Pantalla", rol: "Administrador", accion: "personalizar el entorno visual", beneficio: "adaptar los colores a la corporación.", criterios: ["Selector interactivo de colores HEX/RGB.", "Área de previsualización en tiempo real."], imagen: "hu11_param_pantalla.png" },

        { seccion: "TABLAS MAESTRAS", id: "HU-12", titulo: "Maestro: Usuarios", rol: "Administrador", accion: "gestionar los operadores del sistema", beneficio: "controlar quién tiene cuentas en la aplicación.", criterios: ["Formulario clásico de lectura, edición y alta.", "Asignar código interno y estado activo/inactivo."], imagen: "hu12_maestra_usuarios.png" },
        { id: "HU-13", titulo: "Maestro: Productos", rol: "Administrador", accion: "mantener el catálogo de productos", beneficio: "agilizar el autocompletado en el pesaje.", criterios: ["Campos para código del material y descripción técnica."], imagen: "hu13_maestra_productos.png" },
        { id: "HU-14", titulo: "Maestro: Cliente / Proveedor", rol: "Administrador", accion: "registrar las empresas asociadas", beneficio: "asociar los tickets fiscales a entidades válidas.", criterios: ["Registro de RUC/DNI, razón social y correo de notificación."], imagen: "hu14_maestra_clientes.png" },
        { id: "HU-15", titulo: "Maestro: Conductores", rol: "Administrador", accion: "registrar a los choferes", beneficio: "mantener la trazabilidad del personal de carga.", criterios: ["Control por número de licencia de conducir y nombre completo."], imagen: "hu15_maestra_conductores.png" },
        { id: "HU-16", titulo: "Maestro: Empresas de Transporte", rol: "Administrador", accion: "vincular camiones a transportistas", beneficio: "identificar contratistas de logística.", criterios: ["Registro del RUC del transportista y razón social."], imagen: "hu16_maestra_transporte.png" },
        { id: "HU-17", titulo: "Maestro: Tipos de Bulto", rol: "Administrador", accion: "clasificar los embalajes", beneficio: "reportar si la carga viene a granel, sacos, palets, etc.", criterios: ["Id abreviado (ej. SACOS) y descripción larga."], imagen: "hu17_maestra_bultos.png" },
        { id: "HU-18", titulo: "Maestro: Correlativo", rol: "Administrador", accion: "reiniciar o ajustar el numerador de tickets", beneficio: "solucionar saltos en la numeración legal.", criterios: ["Mostrar advertencia de seguridad crítica.", "Forzar tipo de dato entero con relleno de ceros."], imagen: "hu18_maestra_correlativo.png" },

        { seccion: "SEGURIDAD Y ACCESOS", id: "HU-19", titulo: "Utilidades: Cambio de Sesión", rol: "Operador", accion: "cambiar de usuario activo", beneficio: "permitir el relevo de turnos sin reiniciar el software.", criterios: ["Selector de usuarios registrados.", "Autenticación segura mediante contraseña."], imagen: "hu19_util_sesion.png" },
        { id: "HU-20", titulo: "Utilidades: Cambiar Contraseña", rol: "Usuario", accion: "actualizar su contraseña", beneficio: "mantener las políticas de seguridad vigentes.", criterios: ["Validación de contraseña actual y confirmación de nueva.", "Validar reglas: mínimo 5 caracteres, alfanumérico."], imagen: "hu20_util_password.png" },
        { id: "HU-21", titulo: "Utilidades: Matriz de Permisos", rol: "Administrador", accion: "gestionar el Nivel de Acceso", beneficio: "restringir menús operativos según el perfil del trabajador.", criterios: ["Visualizar una matriz de accesos interactiva.", "Asignar bloqueos a Mantenimiento o Parámetros para roles de solo Operador."], imagen: "hu21_util_permisos.png" }
    ];

    const listContainer = document.getElementById('hu-list');
    const contentContainer = document.getElementById('main-content');

    function renderHUs() {
        historias.forEach((hu, index) => {
            if (hu.seccion) {
                const sectionHeader = document.createElement('div');
                sectionHeader.className = 'menu-section';
                sectionHeader.textContent = hu.seccion;
                if (index > 0) sectionHeader.style.marginTop = '15px';
                listContainer.appendChild(sectionHeader);
            }

            const listItem = document.createElement('div');
            listItem.className = `hu-item ${index === 0 ? 'active' : ''}`;
            listItem.onclick = () => showHU(index, listItem);
            listItem.innerHTML = `<div class="hu-id">${hu.id}</div><div class="hu-title">${hu.titulo}</div>`;
            listContainer.appendChild(listItem);

            const card = document.createElement('div');
            card.className = `hu-detail-card ${index === 0 ? 'active' : ''}`;
            card.id = `card-${index}`;
            card.innerHTML = `
                <div class="detail-header">
                    <div><h2>${hu.titulo}</h2></div>
                    <div class="badge">${hu.id}</div>
                </div>
                <div class="user-story-format">
                    <p><strong>COMO</strong> ${hu.rol}</p>
                    <p><strong>QUIERO</strong> ${hu.accion}</p>
                    <p><strong>PARA</strong> ${hu.beneficio}</p>
                </div>
                <h3>Criterios de Aceptación Técnicos:</h3>
                <ul class="criteria">
                    ${hu.criterios.map(c => `<li>${c}</li>`).join('')}
                </ul>
                <h3>Evidencia del Desarrollo:</h3>
                <div class="screenshot-container">
                    <img src="${hu.imagen}" alt="Pantalla de ${hu.titulo}" onerror="this.onerror=null; this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'800\\' height=\\'400\\'><rect width=\\'100%\\' height=\\'100%\\' fill=\\'%23f1f5f9\\' /><path d=\\'M350,150 L450,150 L400,250 Z\\' fill=\\'%23cbd5e1\\' /><text x=\\'50%\\' y=\\'65%\\' font-family=\\'Arial\\' font-weight=\\'bold\\' font-size=\\'18\\' fill=\\'%2364748b\\' text-anchor=\\'middle\\'>ESPERANDO IMAGEN</text></svg>'">
                    <br>                </div>
            `;
            contentContainer.appendChild(card);
        });
    }

    function showHU(index, itemElement) {
        document.querySelectorAll('.hu-item').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.hu-detail-card').forEach(el => el.classList.remove('active'));
        itemElement.classList.add('active');
        document.getElementById(`card-${index}`).classList.add('active');
    }

    renderHUs();
</script>
</body>
</html>
